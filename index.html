<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AeroParts Exchange</title>
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #0284c7;
            --dark: #0f172a;
            --light: #f8fafc;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background: var(--light); color: var(--dark); }
        header { background: var(--primary); color: white; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: bold; font-size: 1.5rem; }
        .auth-buttons button { background: transparent; border: 1px solid white; color: white; padding: 0.5rem 1rem; cursor: pointer; border-radius: 4px; margin-left: 0.5rem; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .tabs { display: flex; margin-bottom: 2rem; border-bottom: 2px solid #e2e8f0; }
        .tab { padding: 1rem 2rem; cursor: pointer; font-weight: 600; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .tab.active { border-bottom-color: var(--secondary); color: var(--secondary); }
        .panel { display: none; background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .panel.active { display: block; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        input, select { width: 100%; padding: 0.75rem; border: 1px solid #cbd5e1; border-radius: 4px; font-size: 1rem; }
        button.btn { background: var(--secondary); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 4px; cursor: pointer; font-size: 1rem; font-weight: bold; }
        button.btn:hover { background: #0369a1; }
        .part-card { border: 1px solid #e2e8f0; padding: 1rem; margin-top: 1rem; border-radius: 4px; background: #fafafa; }
        .status-msg { margin-top: 1rem; padding: 0.75rem; border-radius: 4px; display: none; font-weight: 500; white-space: pre-wrap; }
    </style>
</head>
<body>

<header>
    <div class="logo">✈️ AeroParts Exchange</div>
    <div class="auth-buttons">
        <button onclick="alert('User login system setup follows in the next step!')">Login / Register</button>
    </div>
</header>

<div class="container">
    <div class="tabs">
        <div id="tab-search" class="tab active" onclick="switchTab('search')">🔍 Search Parts (Buyer)</div>
        <div id="tab-upload" class="tab" onclick="switchTab('upload')">📦 Upload Inventory (Seller)</div>
    </div>

    <!-- SEARCH PANEL -->
    <div id="search-panel" class="panel active">
        <h2>Find Aircraft Components</h2>
        <p style="margin-bottom: 1.5rem; color: #64748b;">Search the global database by part number.</p>
        <div class="form-group" style="display: flex; gap: 0.5rem;">
            <input type="text" id="search-pn" placeholder="Enter Part Number...">
            <button class="btn" onclick="searchParts()">Search</button>
        </div>
        <div id="search-results"></div>
    </div>

    <!-- UPLOAD PANEL -->
    <div id="upload-panel" class="panel">
        <h2>List Your Stock</h2>
        <p style="margin-bottom: 1.5rem; color: #64748b;">Upload your current available inventory to our database.</p>
        <div class="form-group"><label>Part Number (P/N)</label><input type="text" id="up-pn" placeholder="e.g., 65B40111-12"></div>
        <div class="form-group"><label>Description / Name</label><input type="text" id="up-desc" placeholder="e.g., Flap Actuator"></div>
        <div class="form-group">
            <label>Condition</label>
            <select id="up-cond">
                <option>New Surplus (NS)</option>
                <option>Overhauled (OH)</option>
                <option>Serviceable (SV)</option>
                <option>As-Is / Repairable (AR)</option>
            </select>
        </div>
        <div class="form-group"><label>Quantity</label><input type="number" id="up-qty" min="1" value="1"></div>
        <button class="btn" onclick="uploadPart()">Add to Stock</button>
        <div id="upload-status" class="status-msg"></div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://supabase.co";
    const SUPABASE_KEY = "sb_publishable_U3mCMQkf54YAPGGpuk4sJw_MRZuroGy";

    function switchTab(tabName) {
        document.getElementById('tab-search').classList.remove('active');
        document.getElementById('tab-upload').classList.remove('active');
        document.getElementById('search-panel').classList.remove('active');
        document.getElementById('upload-panel').classList.remove('active');
        
        if(tabName === 'search') {
            document.getElementById('tab-search').classList.add('active');
            document.getElementById('search-panel').classList.add('active');
        } else {
            document.getElementById('tab-upload').classList.add('active');
            document.getElementById('upload-panel').classList.add('active');
        }
    }

    async function sendRequest(tableName, method, body = null, queryParams = "") {
        const url = `${SUPABASE_URL}/${tableName}${queryParams}`;
        const options = {
            method: method,
            headers: {
                'apikey': SUPABASE_KEY,
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'Content-Type': 'application/json',
                'Prefer': method === 'POST' ? 'return=minimal' : ''
            }
        };
        if (body) options.body = JSON.stringify(body);
        return await fetch(url, options);
    }

    async function uploadPart() {
        const pn = document.getElementById('up-pn').value.trim();
        const desc = document.getElementById('up-desc').value.trim();
        const cond = document.getElementById('up-cond').value;
        const qty = parseInt(document.getElementById('up-qty').value);
        const statusDiv = document.getElementById('upload-status');

        if(!pn || !desc) {
            alert('Please fill out Part Number and Description.');
            return;
        }

        statusDiv.style.display = 'block';
        statusDiv.style.background = '#e0f2fe';
        statusDiv.style.color = '#0369a1';
        statusDiv.innerText = "Connecting to cloud data server...";

        const payload = { part_number: pn, description: desc, condition: cond, quantity: qty };

        try {
            // Strategy: Try capitalized 'Parts' table first, fall back to lowercase 'parts' if it fails
            let response = await sendRequest('Parts', 'POST', payload);
            
            if (!response.ok) {
                response = await sendRequest('parts', 'POST', payload);
            }

            if (response.ok) {
                statusDiv.style.background = '#dcfce7';
                statusDiv.style.color = '#15803d';
                statusDiv.innerText = "Success! Part successfully saved to your database.";
                document.getElementById('up-pn').value = '';
                document.getElementById('up-desc').value = '';
            } else {
                const errText = await response.text();
                throw new Error(errText || `Server responded with code ${response.status}`);
            }
        } catch (error) {
            statusDiv.style.background = '#fee2e2';
            statusDiv.style.color = '#b91c1c';
            statusDiv.innerText = `Database Error Connection Failed:\n${error.message}\n\nTip: Double-check your column spellings inside Supabase Table Editor.`;
        }
    }

    async function searchParts() {
        const query = document.getElementById('search-pn').value.trim();
        const resultsDiv = document.getElementById('search-results');
        
        if(!query) {
            alert('Please enter a part number to search.');
            return;
        }

        resultsDiv.innerHTML = "<p style='color:#64748b;'>Searching global database...</p>";
        const queryParams = `?part_number=ilike.*${encodeURIComponent(query)}*`;

        try {
            let response = await sendRequest('Parts', 'GET', null, queryParams);
            if (!response.ok) {
                response = await sendRequest('parts', 'GET', null, queryParams);
            }

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(errText);
            }

            const data = await response.json();
            resultsDiv.innerHTML = "";

            if(data.length === 0) {
                resultsDiv.innerHTML = "<p style='color:#b91c1c; font-weight:500;'>No matching aircraft parts found in stock.</p>";
                return;
            }

            data.forEach(item => {
                const card = document.createElement('div');
                card.className = 'part-card';
                card.innerHTML = `
                    <h4>${item.description || 'No Description'}</h4>
                    <p style="font-size: 0.9rem; color: #64748b;">P/N: ${item.part_number || 'N/A'} | Condition: ${item.condition || 'N/A'}</p>
                    <p style="margin-top: 0.5rem; font-weight: bold; color: var(--primary);">Qty Available: ${item.quantity ?? 0}</p>
                `;
                resultsDiv.appendChild(card);
            });
        } catch (error) {
            resultsDiv.innerHTML = `<p style='color:#b91c1c;'>Search failure: ${error.message}</p>`;
        }
    }
</script>
</body>
</html>
